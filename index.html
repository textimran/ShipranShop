<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>আমার পণ্যসমূহ</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f4f4f4;
  }
  h1 {
    text-align: center;
  }
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }
  .product {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 250px;
    margin: 10px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .product img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }
  .product h2 {
    font-size: 1.2em;
    margin: 10px 0 5px 0;
  }
  .product p {
    margin: 5px 0;
  }
  .order-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background-color: #25D366;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
  }
</style>
</head>
<body>

<h1>আমার পণ্যসমূহ</h1>

<div class="products" id="product-list"></div>

<script>
  const products = [
    {
      name: "পণ্য ১",
      desc: "এটি প্রথম পণ্য",
      price: 100,
      imageUrl: "https://via.placeholder.com/250"
    },
    {
      name: "পণ্য ১",
      desc: "এটি প্রথম পণ্য",
      price: 100,
      imageUrl: "https://via.placeholder.com/250"
    },
    {
      name: "পণ্য ২",
      desc: "এটি দ্বিতীয় পণ্য",
      price: 200,
      imageUrl: "https://via.placeholder.com/250"
    }
  ];

  const container = document.getElementById('product-list');

  products.forEach((product) => {
    const productDiv = document.createElement('div');
    productDiv.className = 'product';

    productDiv.innerHTML = `
      <img src="${product.imageUrl}" alt="${product.name}" />
      <h2>${product.name}</h2>
      <p>${product.desc}</p>
      <p>মূল্য: $${product.price}</p>
      <a class="order-btn" href="https://wa.me/8801318778325" target="_blank">অর্ডার করুন</a>
    `;
    container.appendChild(productDiv);
  });
</script>

</body>
</html>
