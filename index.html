<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shipran Shop</title>
<!-- Google Fonts যোগ করুন -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background-color: #f4f4f4;
  }

  /* হেডার স্টাইল */
  header {
    background-color: #222;
    color: #fff;
    padding: 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header h1 {
    margin: 0;
    font-size: 2em;
  }

  .shop-details {
    margin-top: 10px;
    display: flex;
    justify-content: space-around;
    width: 100%;
    max-width: 1000px;
    flex-wrap: wrap;
  }

  .shop-details div {
    margin: 10px 20px;
    text-align: center;
  }

  .shop-details h3 {
    margin: 5px 0;
    font-weight: normal;
  }

  /* পণ্য গুলোর কন্টেইনার */
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
  }

  .product {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 250px;
    margin: 10px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }

  .product:hover {
    transform: translateY(-5px);
  }

  .product img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }

  .product h2 {
    font-size: 1.2em;
    margin: 10px 0 5px 0;
  }

  .product p {
    margin: 5px 0;
  }

  .order-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background-color: #25D366;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    font-weight: 600;
  }

  /* ফুটার স্টাইল */
  footer {
    background-color: #222;
    color: #fff;
    padding: 20px 20px;
    margin-top: 20px;
  }

  .payment-methods {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    flex-wrap: wrap;
  }

  .payment-methods img {
    width: 100px;
    height: auto;
    max-height: 50px;
  }

  /* ওনারের নাম ও অন্যান্য তথ্য */
  .owner-info {
    margin-top: 15px;
    text-align: center;
  }

  .owner-info p {
    margin: 5px 0;
  }
</style>
</head>
<body>

<!-- হেডার -->
<header>
  <h1>Shipran Shop</h1>
  <div class="shop-details">
    <div>
      <h3>Shipran Shop</h3>
      <p>Dhaka,Bangladesh</p>
    </div>
    <div>
      <h3>Proprietor:Imran Hosain</h3>
      <p>call:+8801318778325</p>
    </div>
  </div>
</header>

<!-- পণ্য দেখানো -->
<div class="products" id="product-list"></div>

<!-- ফুটার -->
<footer>
  <div class="owner-info">
    <p>© Shipran Hub।</p>
  </div>
  <div class="payment-methods">
    <img src="https://img.icons8.com/color/48/000000/bkash.png" alt="Bkash" title="Bkash" />
    <img src="https://img.icons8.com/color/48/000000/nogod.png" alt="Nogod" title="Nogod" />
    <img src="https://img.icons8.com/ios/50/000000/rocket.png" alt="Rocket" title="Rocket" />
  </div>
</footer>

<script>
  const products = [
    {
      name: "পণ্য ১",
      desc: "এটি প্রথম পণ্য",
      price: 100,
      imageUrl: "https://via.placeholder.com/250"
    },
    {
      name: "পণ্য ২",
      desc: "এটি দ্বিতীয় পণ্য",
      price: 200,
      imageUrl: "https://via.placeholder.com/250"
    },
    {
      name: "নতুন পণ্য",
      desc: "এটি নতুন পণ্য",
      price: 300,
      imageUrl: "https://via.placeholder.com/250"
    }
  ];

  const container = document.getElementById('product-list');

  products.forEach((product) => {
    const productDiv = document.createElement('div');
    productDiv.className = 'product';

    productDiv.innerHTML = `
      <img src="${product.imageUrl}" alt="${product.name}" />
      <h2>${product.name}</h2>
      <p>${product.desc}</p>
      <p>মূল্য: $${product.price}</p>
      <a class="order-btn" href="https://wa.me/8801318778325" target="_blank">অর্ডার করুন</a>
    `;
    container.appendChild(productDiv);
  });
</script>

</body>
</html>
