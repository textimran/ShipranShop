<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShipranShop</title>
<!-- Google Fonts যোগ করুন -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background-color: #f4f4f4;
  }

  /* হেডার স্টাইল */
  header {
    background-color: #222;
    color: #fff;
    padding: 10px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-logo {
    display: flex;
    align-items: center;
  }

  .header-logo img {
    width: 50px;
    height: auto;
    margin-right: 10px;
  }

  header h1 {
    margin: 0;
    font-size: 1.8em;
  }

  /* পণ্য গুলোর কন্টেইনার */
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
  }

  .product {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 250px;
    margin: 10px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }

  .product:hover {
    transform: translateY(-5px);
  }

  .product img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }

  .product h2 {
    font-size: 1.2em;
    margin: 10px 0 5px 0;
  }

  .product p {
    margin: 5px 0;
  }

  .order-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background-color: #25D366;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    font-weight: 600;
  }

  /* ফুটার স্টাইল */
  footer {
    background-color: #1f1f1f;
    color: #ffffff;
    padding: 10px 40px;
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .footer-owner {
    margin: 10px 0;
  }

  .payment-methods {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin: 10px 0;
  }

  .payment-methods img {
    width: 100px;
    height: auto;
    max-height: 50px;
  }
</style>
</head>
<body>

<!-- হেডার -->
<header>
  <div class="header-logo">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/shopping-cart.png" alt="Logo" />
    <h1>ShipranShop</h1>
  </div>
</header>

<!-- পণ্য দেখানো -->
<div class="products" id="product-list"></div>

<!-- ফুটার -->
<footer>
  <div class="footer-owner">
    <h3>Imran Hosain</h3>
    <p>Dhaka,Bangladesh</p>
    <p>Call:+8801318778325</p>
  </div>
  <div class="payment-methods">
    <img src="https://1000logos.net/wp-content/uploads/2021/02/Bkash-logo.jpg" alt="Bkash" title="Bkash" />
    <img src="https://mir-s3-cdn-cf.behance.net/projects/404/5158cf130529723.Y3JvcCw2NTMsNTEwLDI5OSwxOTg.jpg" alt="Nogod" title="Nogod" />
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLjql9YpLgqF8uB2zbxoauU9JdXuwH52svFA&s" alt="Rocket" title="Rocket" />
  </div>
</footer>

<script>
  const products = [
    { name: "পণ্য ১", desc: "এটি প্রথম পণ্য", price: 100, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ২", desc: "এটি দ্বিতীয় পণ্য", price: 200, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ৩", desc: "এটি তৃতীয় পণ্য", price: 300, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ৪", desc: "এটি চতুর্থ পণ্য", price: 400, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ৫", desc: "এটি পঞ্চম পণ্য", price: 500, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ৬", desc: "এটি ষষ্ঠ পণ্য", price: 600, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ৭", desc: "এটি সপ্তম পণ্য", price: 700, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ৮", desc: "এটি অষ্টম পণ্য", price: 800, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ৯", desc: "এটি নবম পণ্য", price: 900, imageUrl: "https://via.placeholder.com/250" },
    { name: "পণ্য ১০", desc: "এটি দশম পণ্য", price: 1000, imageUrl: "https://via.placeholder.com/250" }
  ];

  const container = document.getElementById('product-list');

  products.forEach((product) => {
    const productDiv = document.createElement('div');
    productDiv.className = 'product';

    productDiv.innerHTML = `
      <img src="${product.imageUrl}" alt="${product.name}" />
      <h2>${product.name}</h2>
      <p>${product.desc}</p>
      <p>মূল্য: $${product.price}</p>
      <a class="order-btn" href="https://wa.me/8801318778325" target="_blank">অর্ডার করুন</a>
    `;
    container.appendChild(productDiv);
  });
</script>

</body>
</html>
